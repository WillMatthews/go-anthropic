name: API drift check

on:
  pull_request:
  schedule:
    # Weekly, Mondays 06:00 UTC — catches new API surface between PRs.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  driftcheck:
    name: Detect SDK/API drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run driftcheck
        run: |
          go run ./cmd/driftcheck \
            -allowlist cmd/driftcheck/allowlist.txt \
            | tee drift-report.txt

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: drift-report.txt
